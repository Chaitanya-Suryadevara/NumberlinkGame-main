openapi: 3.0.3
info:
  title: Numberlink API
  version: 1.0.0

paths:
  /levels:
    get:
      summary: Get levels
      responses:
        "200":
          description: List of levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Level"
              example:
                - id: "api-easy"
                  size: 5
                  difficulty: "easy"
                  pairs:
                    - id: "A"
                      color: "#e74c3c"
                      start:
                        x: 0
                        y: 0
                      end:
                        x: 4
                        y: 0
                    - id: "B"
                      color: "#3498db"
                      start:
                        x: 0
                        y: 1
                      end:
                        x: 4
                        y: 1
                    - id: "C"
                      color: "#2ecc71"
                      start:
                        x: 0
                        y: 2
                      end:
                        x: 4
                        y: 2
                    - id: "D"
                      color: "#f59e0b"
                      start:
                        x: 0
                        y: 3
                      end:
                        x: 4
                        y: 3
                    - id: "E"
                      color: "#8b5cf6"
                      start:
                        x: 0
                        y: 4
                      end:
                        x: 4
                        y: 4

  /levels/{levelId}:
    get:
      summary: Get level by id
      parameters:
        - name: levelId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Level detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Level"
              example:
                id: "api-easy"
                size: 5
                difficulty: "easy"
                pairs:
                  - id: "A"
                    color: "#e74c3c"
                    start:
                      x: 0
                      y: 0
                    end:
                      x: 4
                      y: 0
                  - id: "B"
                    color: "#3498db"
                    start:
                      x: 0
                      y: 1
                    end:
                      x: 4
                      y: 1
                  - id: "C"
                    color: "#2ecc71"
                    start:
                      x: 0
                      y: 2
                    end:
                      x: 4
                      y: 2
                  - id: "D"
                    color: "#f59e0b"
                    start:
                      x: 0
                      y: 3
                    end:
                      x: 4
                      y: 3
                  - id: "E"
                    color: "#8b5cf6"
                    start:
                      x: 0
                      y: 4
                    end:
                      x: 4
                      y: 4

  /scores:
    get:
      summary: Get scores
      parameters:
        - name: levelId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Score list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Score"
              example:
                - id: "score-1"
                  levelId: "api-easy"
                  playerName: "Test"
                  timeSeconds: 30
                  createdAt: "2026-04-26T12:00:00.000Z"

    post:
      summary: Submit score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreInput"
            example:
              levelId: "api-easy"
              playerName: "Test"
              timeSeconds: 30
              createdAt: "2026-04-26T12:00:00.000Z"
      responses:
        "200":
          description: Score submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"
              example:
                id: "score-new"
                levelId: "api-easy"
                playerName: "Test"
                timeSeconds: 30
                createdAt: "2026-04-26T12:00:00.000Z"

components:
  schemas:
    Point:
      type: object
      required:
        - x
        - y
      properties:
        x:
          type: integer
          example: 0
        y:
          type: integer
          example: 0

    Pair:
      type: object
      required:
        - id
        - color
        - start
        - end
      properties:
        id:
          type: string
          example: "A"
        color:
          type: string
          example: "#e74c3c"
        start:
          $ref: "#/components/schemas/Point"
        end:
          $ref: "#/components/schemas/Point"

    Level:
      type: object
      required:
        - id
        - size
        - difficulty
        - pairs
      properties:
        id:
          type: string
          example: "api-easy"
        size:
          type: integer
          example: 5
        difficulty:
          type: string
          enum:
            - easy
            - medium
            - hard
          example: "easy"
        pairs:
          type: array
          items:
            $ref: "#/components/schemas/Pair"

    ScoreInput:
      type: object
      required:
        - levelId
        - playerName
        - timeSeconds
        - createdAt
      properties:
        levelId:
          type: string
          example: "api-easy"
        playerName:
          type: string
          example: "Test"
        timeSeconds:
          type: integer
          example: 30
        createdAt:
          type: string
          example: "2026-04-26T12:00:00.000Z"

    Score:
      type: object
      required:
        - id
        - levelId
        - playerName
        - timeSeconds
        - createdAt
      properties:
        id:
          type: string
          example: "score-new"
        levelId:
          type: string
          example: "api-easy"
        playerName:
          type: string
          example: "Test"
        timeSeconds:
          type: integer
          example: 30
        createdAt:
          type: string
          example: "2026-04-26T12:00:00.000Z"