version: "3.8"

services:
  prism:
    image: stoplight/prism:4
    command: mock -h 0.0.0.0 -p 4010 /tmp/swagger.yaml
    volumes:
      - ./swagger.yaml:/tmp/swagger.yaml:ro
    ports:
      - "4010:4010"

  swagger-ui:
    image: swaggerapi/swagger-ui
    environment:
      SWAGGER_JSON: /swagger.yaml
    volumes:
      - ./swagger.yaml:/swagger.yaml
    ports:
      - "8080:8080"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - prism
      - swagger-ui